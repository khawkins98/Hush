# Tag-driven cross-platform build + GitHub Release publication.
#
# Triggers on a `v*` tag push. Each platform builds in parallel via
# `tauri-action`, which produces a .dmg / .AppImage / .deb / .msi /
# .exe and attaches it to a draft GitHub Release named after the tag.
# We deliberately ship the release as a draft on first creation so a
# maintainer can review the artefact list before flipping it to
# Published.
#
# ## What's signed (or not)
#
# - **macOS**: ad-hoc signed only for v1. The first time a user
#   downloads, macOS will show the standard "downloaded from
#   internet" Gatekeeper warning; right-click → Open opens it once,
#   subsequent launches are silent. Developer ID + notarisation is
#   the right next step (#222 follow-up); needs an `APPLE_*`
#   secrets bundle.
# - **Windows**: unsigned. SmartScreen warning on first run.
#   EV cert + signtool is the follow-up.
# - **Linux**: AppImage / .deb don't sign artefacts the same way;
#   shipped as-is.
#
# ## How to cut a release
#
# 1. Bump `version` in `src-tauri/tauri.conf.json` and
#    `src-tauri/Cargo.toml`.
# 2. Update CHANGELOG.md.
# 3. `git tag v0.2.0 && git push origin v0.2.0`.
# 4. Wait for the workflow. Each matrix leg takes ~10–20 min depending
#    on cache state. The whisper.cpp build is the slow part.
# 5. Open the draft release on GitHub, review artefacts, paste the
#    CHANGELOG entry into the body, click Publish.
#
# To dry-run without tagging: trigger via the "Run workflow" button
# (workflow_dispatch). The artefacts upload to a draft release named
# after the dispatch run; delete the release after inspection.
name: Release

on:
  push:
    tags: ['v*']
  # Allow manual runs from the Actions UI for dry-run / smoke testing
  # the build matrix without cutting an actual tag. The workflow
  # publishes to a draft release tagged with the run id so accidental
  # dispatches don't pollute the release list.
  workflow_dispatch:

# One release per ref. If the same tag is re-pushed (a moving tag
# corrected mid-build, an amend before the build completes), cancel
# the in-flight run so the second run's artefacts are the only
# ones attached to the release. Pre-#274 this was `false`, which
# allowed the old run to finish and double-upload artefacts under
# the same tag — the resulting release listed two .dmgs / .msis
# at slightly different versions. The user-facing damage of a
# cancelled-mid-upload run (incomplete artefacts on the draft
# release) is smaller than the damage of a confused user pulling
# a stale binary from a duplicate-listed release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build (${{ matrix.label }})
    permissions:
      # tauri-action needs `contents: write` to create / update the
      # release and attach artefacts. No other permissions required.
      contents: write
    strategy:
      # Don't abort the other platforms when one fails — a
      # macOS-Apple-Silicon failure shouldn't kill the Linux + Windows
      # artefacts a maintainer can still ship.
      fail-fast: false
      matrix:
        include:
          # macOS 26 (Tahoe) is the project's declared primary
          # target (CLAUDE.md, "macOS 26 only"). 26 is Apple-
          # Silicon-only, so an Intel build leg has nothing to
          # run on that we ship for. Dropped accordingly. If a
          # future need for Intel arises, add the leg back AND
          # lower MACOSX_DEPLOYMENT_TARGET to whatever the oldest
          # supported Intel macOS is.
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: --target aarch64-apple-darwin
          - platform: ubuntu-latest
            label: Linux
            args: ''
          - platform: windows-latest
            label: Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev libxi-dev libxtst-dev libx11-dev \
            libasound2-dev \
            cmake pkg-config patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-01)
        with:
          # Apple Silicon target on macOS legs. Intel was dropped
          # alongside the matrix entry — see the comment on the
          # matrix above.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target
          # Distinguish the two macOS legs so they don't fight over
          # the same cache key — each Apple Silicon vs Intel build
          # has its own target dir entries.
          key: ${{ matrix.label }}

      # Combined macOS clang flags (i8mm + deployment target).
      #
      # i8mm: whisper.cpp's GGML uses `vmmlaq_s32` unconditionally on
      # aarch64. Apple Silicon supports it but the default macOS
      # clang doesn't enable the target feature, so the build fails
      # with "requires target feature 'i8mm'" without
      # `-march=armv8.6-a` (which baselines i8mm). Same flag as
      # ci.yml.
      #
      # Deployment target: the previous attempt set
      # `MACOSX_DEPLOYMENT_TARGET=26.0` via $GITHUB_ENV, but
      # whisper-rs-sys's build script doesn't honour the env var,
      # so clang ended up with no deployment target and emitted
      # `'~directory_iterator' is unavailable: introduced in
      # macOS 10.15 unknown` for whisper.cpp's C++17 `<filesystem>`
      # use. Passing `-mmacosx-version-min=` directly through
      # CFLAGS/CXXFLAGS bypasses the build script entirely — clang
      # always honours its own command-line flags.
      #
      # Why 14.0 and not 26.0:
      # - GitHub's macos-latest runner uses Xcode 16.4, which ships
      #   the macOS 15 SDK. We can't deploy-target a version
      #   higher than the SDK supports.
      # - 14.0 (Sonoma) is well above 10.15 (so whisper.cpp's
      #   <filesystem> compiles), is Apple-Silicon-supported
      #   (>= 11.0), and is comfortably below the SDK ceiling.
      # - The project's *design* target is macOS 26 — that's the
      #   surface we hands-on test on. The binary's deployment
      #   target is the lower-bound technical floor; users on
      #   macOS 14 / 15 will probably have most things work but
      #   we don't promise anything for that window.
      - name: Set macOS clang flags (i8mm + deployment target)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # Two deployment-target env vars are required (#288 /
          # 2026-04-30 learnings update). The `cc` crate reads
          # `MACOSX_DEPLOYMENT_TARGET`; cmake-rs reads
          # `CMAKE_OSX_DEPLOYMENT_TARGET`. Each crate contributes
          # compile flags to whisper-rs-sys's build, and missing
          # either re-introduces a `-mmacosx-version-min=10.13`
          # injection that whisper.cpp's C++17 `<filesystem>` use
          # doesn't tolerate. Pre-fix only `MACOSX_DEPLOYMENT_TARGET`
          # was set; that's why smoke runs #1–#3 of release.yml all
          # failed on the macOS leg with "fs::exists has been
          # explicitly marked unavailable".
          FLAGS="-march=armv8.6-a -mmacosx-version-min=14.0"
          echo "CFLAGS=$FLAGS" >> "$GITHUB_ENV"
          echo "CXXFLAGS=$FLAGS" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Push the actual build through tauri-action. It runs
      # `npm run tauri build -- ${args}`, then walks the bundle
      # output dir, finds the platform-specific artefacts, and
      # attaches them to a GitHub Release. The release is created on
      # the first matrix leg and re-used by the others — the action
      # de-duplicates on the resolved tag name.
      - name: Build and publish
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('dispatch-{0}', github.run_id) || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && format('Dispatch run {0}', github.run_id) || format('Hush {0}', github.ref_name) }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/khawkins98/Hush/blob/main/CHANGELOG.md) for the human-readable change log.

            ### Install

            - **macOS**: download the `.dmg`, open it, drag Hush.app
              to Applications. First launch will show a Gatekeeper
              warning — right-click Hush.app → Open to bypass.
              (Notarisation is on the roadmap.)
            - **Windows**: download the `.msi` or `.exe`. SmartScreen
              will warn on first run; click "More info" → "Run
              anyway." (Code signing is on the roadmap.)
            - **Linux**: `.AppImage` (any distro) or `.deb`
              (Debian/Ubuntu).
          # Ship as draft so a maintainer can review the attached
          # artefacts before publishing — first-time release plumbing
          # is the kind of thing that benefits from a manual gate.
          releaseDraft: true
          prerelease: false
          # Args land between `tauri build` and the platform's
          # native bundler — currently used to fan out per-arch
          # macOS builds.
          args: ${{ matrix.args }}

      # Inject "Read Me First.txt" into the macOS DMG so users see
      # Gatekeeper bypass instructions the moment they open the disk
      # image.  tauri-action has already uploaded the original DMG to
      # the draft release; we post-process the DMG still in the
      # workspace and re-upload with --clobber to replace it.
      #
      # NOTE: this step must run before any DMG signing,
      # notarisation, checksum generation, or updater-signature
      # generation — modifying the DMG after those steps would
      # invalidate their outputs.
      - name: Inject README into macOS DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg \
            -name "*_aarch64.dmg" -not -name "rw.*" | head -1)

          if [[ -z "$DMG_PATH" || ! -f "$DMG_PATH" ]]; then
            echo "No aarch64 DMG found in bundle output" >&2
            exit 1
          fi

          bash scripts/inject-dmg-readme.sh "$DMG_PATH"

          TAG="${{ github.event_name == 'workflow_dispatch' && format('dispatch-{0}', github.run_id) || github.ref_name }}"
          gh release upload "$TAG" "$DMG_PATH" --clobber

      # Update the Homebrew tap cask with the new version + SHA256 so
      # `brew upgrade --cask hush` works after each release.
      # Skipped on workflow_dispatch dry-runs (no real version tag).
      - name: Update Homebrew tap
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'

          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg \
            -name "*_aarch64.dmg" -not -name "rw.*" | head -1)

          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          # Clone the tap, patch the cask, and push.
          git clone --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/khawkins98/homebrew-tap.git" \
            /tmp/homebrew-tap

          sed -i '' \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s/sha256 \".*\"/sha256 \"${SHA256}\"/" \
            /tmp/homebrew-tap/Casks/hush.rb

          cd /tmp/homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hush.rb
          git diff --cached --quiet || \
            git commit -m "chore: update hush cask to v${VERSION}" && \
            git push

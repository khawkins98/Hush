name: CI

on:
  push:
    branches: [main]
  # Run on every pull request, regardless of base branch. Stacked PRs
  # (e.g. feat/* targeting another feat/*) need CI feedback too — a
  # `branches: [main]` filter would silently skip them.
  pull_request:

# Cancel superseded runs on the same branch to avoid burning CI minutes on
# obsolete commits during a rapid push sequence.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows dropped from the matrix while we focus on the macOS/Linux
        # core. The whisper.cpp build on Windows works but doubles total CI
        # runtime, and we are not yet shipping Windows artefacts. Add
        # `windows-latest` back here when Windows distribution lands (M6 per
        # PRD §11) and we have a real reason to gate on it.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Version-agreement check (#270). The version number lives in
      # three places that have to be edited together:
      # `src-tauri/Cargo.toml`, `src-tauri/tauri.conf.json`, and
      # `package.json`. Per `docs/releases.md` they're hand-bumped
      # in lockstep; without this guard a stale one silently produces
      # a release where the binary's `CARGO_PKG_VERSION` disagrees
      # with the About-tab `getVersion()` (which reads
      # `tauri.conf.json`) and the DMG metadata. Cheap; runs on
      # every PR.
      - name: Verify version files agree
        if: runner.os == 'Linux'
        shell: bash
        run: |
          CARGO_VER=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VER=$(jq -r '.version' src-tauri/tauri.conf.json)
          PKG_VER=$(jq -r '.version' package.json)
          echo "Cargo=$CARGO_VER  tauri.conf=$TAURI_VER  package.json=$PKG_VER"
          if [ "$CARGO_VER" != "$TAURI_VER" ] || [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::Version mismatch — these three files must agree."
            echo "Update all three together when bumping (see docs/releases.md)."
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-01)
        with:
          components: clippy, rustfmt

      # Tauri + whisper-rs need a non-trivial pile of system libraries on
      # Linux. We install them explicitly rather than relying on the runner
      # image to ship every transitive dep. cmake is required by whisper-rs.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev libxi-dev libxtst-dev libx11-dev \
            libasound2-dev \
            cmake pkg-config

      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: rustfmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      # The `whisper-rs-sys` build calls into whisper.cpp's GGML, which uses
      # `vmmlaq_s32` (an i8mm intrinsic) unconditionally on aarch64. Apple
      # Silicon supports i8mm, but the default macOS clang invocation does
      # not enable that target feature, so the build fails with
      # `always_inline ... requires target feature 'i8mm'`. Telling clang to
      # target armv8.6-a (which includes i8mm in its baseline) on the macOS
      # runner is the smallest fix that keeps the production target intact.
      # Linux/Windows runners are x86_64 and unaffected.
      #
      # Set BEFORE the first clippy invocation: `whisper` is a default Cargo
      # feature now, so even `cargo clippy --all-targets` (without
      # `--features whisper`) pulls whisper-rs-sys into the build. Setting
      # the CFLAGS later — as a previous version of this workflow did, when
      # `whisper` was opt-in — leaves the default-features clippy step
      # without the flag and reproduces the i8mm error on a cold cache.
      - name: Set whisper.cpp arch flags (macOS arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"

      # ScreenCaptureKit links libSwift_Concurrency at runtime. The
      # screencapturekit crate's build script bakes rpaths pointing at
      # `/Library/Developer/CommandLineTools/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx`,
      # but the GH Actions macos-latest runner has Xcode at
      # `/Applications/Xcode.app/...` and the CommandLineTools path
      # isn't populated with the Swift dylibs there. Test binaries
      # SIGABRT at startup with `Library not loaded:
      # @rpath/libswift_Concurrency.dylib` unless we point dyld at
      # the Xcode toolchain explicitly.
      #
      # Production app bundles inherit the Swift runtime from the
      # macOS dyld shared cache and are unaffected — this is purely
      # a `cargo test` quirk specific to the GH runner image.
      - name: Set Swift runtime dylib path (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          SWIFT_PATH="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx"
          if [ -d "$SWIFT_PATH" ]; then
            echo "DYLD_FALLBACK_LIBRARY_PATH=$SWIFT_PATH" >> "$GITHUB_ENV"
          else
            echo "::warning::Swift runtime path not found at $SWIFT_PATH; SCK-linked test binaries may fail to load"
          fi

      # Clippy on the default feature set first — fast and covers the bulk of
      # the code. The `whisper` feature is exercised separately below; both
      # invocations run with the macOS arch flags set above so whisper.cpp's
      # ARM SIMD intrinsics compile cleanly.
      - name: clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (whisper feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features whisper -- -D warnings

      # CI lint: every TODO/FIXME must reference an issue (// TODO(#NNN): ...).
      # Untagged tags rot; tagged ones are findable from the issue tracker.
      - name: Check for untagged TODOs/FIXMEs
        shell: bash
        run: |
          if grep -rn --include="*.rs" -E "//\s*(TODO|FIXME)[[:space:]:][^(]" src-tauri/src/; then
            echo "ERROR: Found TODO/FIXME without an issue reference. Use // TODO(#NNN): or // FIXME(#NNN):"
            exit 1
          fi

      - name: cargo test (default features)
        working-directory: src-tauri
        run: cargo test

      - name: cargo test (whisper feature)
        working-directory: src-tauri
        run: cargo test --features whisper

  supply-chain-pins:
    name: Supply-chain pin allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Detect if a contributor has added a new RC pin or a new git
      # dep that isn't already on the documented allowlist (#327).
      # The allowlist is encoded as the set of lines that match the
      # patterns *and* are already on main; new matches fail the
      # build so the additions are reviewed under "Supply-chain pins"
      # in `learnings.md`.
      - name: New RC / git / pre-release / registry dep?
        run: |
          set -euo pipefail
          # Skip comment lines (those starting with #) — comments
          # explain the policy and may legitimately mention "rc.X"
          # or example git URLs without those being live deps.
          # Match only on dep-table lines.
          #
          # Patterns flagged (#350 extended #327):
          #   - `rc.N` / `alpha.N` / `beta.N` (any pre-release tag)
          #   - `-pre` / `-dev` (less common but still pre-stable)
          #   - `git = "https...` and the single-quoted variant
          #     (TOML allows both `"` and `'`)
          #   - `registry = ` (a dep pulled from a non-crates.io
          #     registry — a real supply-chain vector that's
          #     invisible to crates.io review)
          current=$(grep -nE '^(ort|rdev|ndarray|[a-zA-Z0-9_-]+) *=' src-tauri/Cargo.toml \
            | grep -E 'rc\.[0-9]+|alpha\.[0-9]+|beta\.[0-9]+|-pre|-dev|git = "https|git = '\''https|registry =' \
            || true)
          # Allowlisted *exact* dep-table lines (kept in lockstep
          # with `learnings.md` → "Supply-chain pins").
          allowed=$(cat <<'EOF'
          ort = { version = "=2.0.0-rc.12", default-features = false, features = ["std", "download-binaries", "ndarray", "tls-rustls"], optional = true }
          rdev = { git = "https://github.com/fufesou/rdev", rev = "a90dbe1172f8832f54c97c62e823c5a34af5fdfe" }
          EOF
          )
          # Strip "<lineno>:" prefix from each `current` entry, then
          # diff against the allowlist.
          unexpected=$(echo "$current" | sed 's/^[0-9]*://' | while IFS= read -r line; do
            [ -z "$line" ] && continue
            if ! echo "$allowed" | grep -qF -- "$line"; then
              echo "$line"
            fi
          done)
          if [ -n "$unexpected" ]; then
            echo "::error::Unallowlisted RC pin or git dep in src-tauri/Cargo.toml:" >&2
            echo "$unexpected" >&2
            echo "::error::Either remove it, or add it to learnings.md 'Supply-chain pins' AND the allowlist in .github/workflows/ci.yml::supply-chain-pins." >&2
            exit 1
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Chromium binary across runs — saves ~30s and a few
      # tens of MB of bandwidth per CI invocation. The cache key
      # tracks the @playwright/test version pinned in package-lock so
      # an upgrade invalidates correctly.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

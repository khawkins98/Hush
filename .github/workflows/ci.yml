name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvn2-dev \
            libxdo-dev libxi-dev libxtst-dev libx11-dev \
            libasound2-dev pkg-config

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: rustfmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for untagged TODOs/FIXMEs
        run: |
          if grep -rn --include="*.rs" -E "//\s*(TODO|FIXME)[^(]" src-tauri/src/; then
            echo "ERROR: Found TODO/FIXME without an issue reference. Use // TODO(#NNN): or // FIXME(#NNN):"
            exit 1
          fi

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

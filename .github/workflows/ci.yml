name: CI

on:
  push:
    branches: [main]
    paths-ignore: &docs-only-paths
      # Markdown-only changes (README, CHANGELOG, learnings.md,
      # docs/**, .audit/**) can't break Rust, the frontend, or any
      # CI-policed surface, so skip the whole workflow rather than
      # burning ~5 minutes of macOS Rust compilation per typo fix.
      # `paths-ignore` only skips when *every* changed file matches,
      # so a mixed code+docs PR still runs the full suite.
      #
      # Branch protection on `main` does not require any specific
      # status check (verified 2026-05-02 via
      # `gh api repos/.../branches/main/protection`), so the
      # absence of a CI run on a docs-only PR doesn't block the
      # merge. If required checks are added later, this list will
      # need to coordinate with them or the doc-skipped job has
      # to be replaced with a status-noop.
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'docs/**'
      - '.audit/**'
  # Run on every pull request, regardless of base branch. Stacked PRs
  # (e.g. feat/* targeting another feat/*) need CI feedback too — a
  # `branches: [main]` filter would silently skip them.
  pull_request:
    paths-ignore: *docs-only-paths

# Cancel superseded runs on the same branch to avoid burning CI minutes on
# obsolete commits during a rapid push sequence.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Rust matrix runs on macOS (primary target) and Linux.
        # Windows gets a lighter compile-only check in the `rust-windows`
        # job below — the whisper.cpp build on Windows works but doubles
        # total CI runtime when paired with clippy + tests, and we are
        # not yet shipping Windows artefacts. Promote `windows-latest`
        # into this matrix when Windows distribution lands (M6 per
        # PRD §11) and the full check is worth the cost.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Version-agreement check (#270). The version number lives in
      # three places that have to be edited together:
      # `src-tauri/Cargo.toml`, `src-tauri/tauri.conf.json`, and
      # `package.json`. Per `docs/releases.md` they're hand-bumped
      # in lockstep; without this guard a stale one silently produces
      # a release where the binary's `CARGO_PKG_VERSION` disagrees
      # with the About-tab `getVersion()` (which reads
      # `tauri.conf.json`) and the DMG metadata. Cheap; runs on
      # every PR.
      - name: Verify version files agree
        if: runner.os == 'Linux'
        shell: bash
        run: |
          CARGO_VER=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VER=$(jq -r '.version' src-tauri/tauri.conf.json)
          PKG_VER=$(jq -r '.version' package.json)
          echo "Cargo=$CARGO_VER  tauri.conf=$TAURI_VER  package.json=$PKG_VER"
          if [ "$CARGO_VER" != "$TAURI_VER" ] || [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::Version mismatch — these three files must agree."
            echo "Update all three together when bumping (see docs/releases.md)."
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-01)
        with:
          components: clippy, rustfmt

      # Tauri + whisper-rs need a non-trivial pile of system libraries on
      # Linux. We install them explicitly rather than relying on the runner
      # image to ship every transitive dep. cmake is required by whisper-rs.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev libxi-dev libxtst-dev libx11-dev \
            libasound2-dev \
            cmake pkg-config

      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: rustfmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      # The `whisper-rs-sys` build calls into whisper.cpp's GGML, which uses
      # `vmmlaq_s32` (an i8mm intrinsic) unconditionally on aarch64. Apple
      # Silicon supports i8mm, but the default macOS clang invocation does
      # not enable that target feature, so the build fails with
      # `always_inline ... requires target feature 'i8mm'`. Telling clang to
      # target armv8.6-a (which includes i8mm in its baseline) on the macOS
      # runner is the smallest fix that keeps the production target intact.
      # Linux/Windows runners are x86_64 and unaffected.
      #
      # Set BEFORE the first clippy invocation: `whisper` is a default Cargo
      # feature now, so even `cargo clippy --all-targets` (without
      # `--features whisper`) pulls whisper-rs-sys into the build. Setting
      # the CFLAGS later — as a previous version of this workflow did, when
      # `whisper` was opt-in — leaves the default-features clippy step
      # without the flag and reproduces the i8mm error on a cold cache.
      - name: Set whisper.cpp arch flags (macOS arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"

      # ScreenCaptureKit links libSwift_Concurrency at runtime. The
      # screencapturekit crate's build script bakes rpaths pointing at
      # `/Library/Developer/CommandLineTools/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx`,
      # but the GH Actions macos-latest runner has Xcode at
      # `/Applications/Xcode.app/...` and the CommandLineTools path
      # isn't populated with the Swift dylibs there. Test binaries
      # SIGABRT at startup with `Library not loaded:
      # @rpath/libswift_Concurrency.dylib` unless we point dyld at
      # the Xcode toolchain explicitly.
      #
      # Production app bundles inherit the Swift runtime from the
      # macOS dyld shared cache and are unaffected — this is purely
      # a `cargo test` quirk specific to the GH runner image.
      - name: Set Swift runtime dylib path (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          SWIFT_PATH="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx"
          if [ -d "$SWIFT_PATH" ]; then
            echo "DYLD_FALLBACK_LIBRARY_PATH=$SWIFT_PATH" >> "$GITHUB_ENV"
          else
            echo "::warning::Swift runtime path not found at $SWIFT_PATH; SCK-linked test binaries may fail to load"
          fi

      # Clippy on the default feature set first — fast and covers the bulk of
      # the code. The `whisper` feature is exercised separately below; both
      # invocations run with the macOS arch flags set above so whisper.cpp's
      # ARM SIMD intrinsics compile cleanly.
      - name: clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (whisper feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features whisper -- -D warnings

      # CI lint: every TODO/FIXME must reference an issue (// TODO(#NNN): ...).
      # Untagged tags rot; tagged ones are findable from the issue tracker.
      - name: Check for untagged TODOs/FIXMEs
        shell: bash
        run: |
          if grep -rn --include="*.rs" -E "//\s*(TODO|FIXME)[[:space:]:][^(]" src-tauri/src/; then
            echo "ERROR: Found TODO/FIXME without an issue reference. Use // TODO(#NNN): or // FIXME(#NNN):"
            exit 1
          fi

      - name: cargo test (default features)
        working-directory: src-tauri
        run: cargo test

      - name: cargo test (whisper feature)
        working-directory: src-tauri
        run: cargo test --features whisper

  rust-windows:
    name: Rust compile check (windows-latest)
    runs-on: windows-latest
    # Lightweight compile-only check: catches the class of regression
    # where a contributor adds a macOS-specific dep without `cfg`-gating
    # it, or a `target_os` arm that doesn't compile on Windows. Skips
    # whisper.cpp entirely (`--no-default-features` excludes the
    # `whisper` and `diarization-onnx` features) so we don't pay the
    # cmake + msvc toolchain cost the original Windows-in-matrix
    # decision rejected. When Windows distribution lands (M6 per
    # PRD §11) this job's role merges into the main `rust` matrix and
    # the lightweight version goes away.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-01)

      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      # `--no-default-features` strips `whisper` and `diarization-onnx`
      # so cmake / ONNX / whisper.cpp aren't required on Windows. We
      # still verify that every cfg-gated arm compiles, the cross-
      # platform glue links, and no macOS-only path slips through
      # without `#[cfg(target_os = "macos")]`.
      - name: cargo check (no default features)
        working-directory: src-tauri
        run: cargo check --no-default-features --all-targets

  supply-chain-pins:
    name: Supply-chain pin allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Detect if a contributor has added a new RC pin or a new git
      # dep that isn't already on the documented allowlist (#327).
      # The allowlist is encoded as the set of lines that match the
      # patterns *and* are already on main; new matches fail the
      # build so the additions are reviewed under "Supply-chain pins"
      # in `learnings.md`.
      - name: New RC / git / pre-release / registry dep?
        run: |
          set -euo pipefail
          # Skip comment lines (those starting with #) — comments
          # explain the policy and may legitimately mention "rc.X"
          # or example git URLs without those being live deps.
          # Match only on dep-table lines.
          #
          # Patterns flagged (#350 extended #327):
          #   - `rc.N` / `alpha.N` / `beta.N` (any pre-release tag)
          #   - `-pre` / `-dev` (less common but still pre-stable)
          #   - `git = "https...` and the single-quoted variant
          #     (TOML allows both `"` and `'`)
          #   - `registry = ` (a dep pulled from a non-crates.io
          #     registry — a real supply-chain vector that's
          #     invisible to crates.io review)
          current=$(grep -nE '^(ort|rdev|ndarray|[a-zA-Z0-9_-]+) *=' src-tauri/Cargo.toml \
            | grep -E 'rc\.[0-9]+|alpha\.[0-9]+|beta\.[0-9]+|-pre|-dev|git = "https|git = '\''https|registry =' \
            || true)
          # Allowlisted *exact* dep-table lines (kept in lockstep
          # with `learnings.md` → "Supply-chain pins").
          allowed=$(cat <<'EOF'
          ort = { version = "=2.0.0-rc.12", default-features = false, features = ["std", "download-binaries", "ndarray", "tls-rustls", "tracing"], optional = true }
          rdev = { git = "https://github.com/fufesou/rdev", rev = "a90dbe1172f8832f54c97c62e823c5a34af5fdfe" }
          EOF
          )
          # Strip "<lineno>:" prefix from each `current` entry, then
          # diff against the allowlist.
          unexpected=$(echo "$current" | sed 's/^[0-9]*://' | while IFS= read -r line; do
            [ -z "$line" ] && continue
            if ! echo "$allowed" | grep -qF -- "$line"; then
              echo "$line"
            fi
          done)
          if [ -n "$unexpected" ]; then
            echo "::error::Unallowlisted RC pin or git dep in src-tauri/Cargo.toml:" >&2
            echo "$unexpected" >&2
            echo "::error::Either remove it, or add it to learnings.md 'Supply-chain pins' AND the allowlist in .github/workflows/ci.yml::supply-chain-pins." >&2
            exit 1
          fi

  cargo-env-allowlist:
    name: Cargo [env] allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Lint the keys under `[env]` in src-tauri/.cargo/config.toml
      # against an explicit allowlist (#410). The `[env]` table
      # affects every contributor's local `cargo build` — a malicious
      # or careless PR adding `RUSTFLAGS`, `CC`, or `RUSTC_WRAPPER`
      # would silently rewrite their build environment. Allowlisted
      # keys today: `MACOSX_DEPLOYMENT_TARGET` and
      # `CMAKE_OSX_DEPLOYMENT_TARGET` (added in #404 to give
      # `whisper-rs-sys`'s vendored whisper.cpp a 10.15+ baseline
      # without shell-environment dependency).
      #
      # Adding a new entry requires updating both the config and
      # this allowlist in the same PR, which puts the addition
      # under code review.
      #
      # Parser is Python `tomllib` (stdlib on 3.11+) rather than
      # the awk shape #413 originally shipped (#418). The awk
      # parser was vulnerable to:
      #
      #   - quoted bare keys (`"RUSTFLAGS" = "x"`)
      #   - indented keys (`  RUSTFLAGS = "x"`)
      #   - dotted-table form (`[env.RUSTFLAGS]`)
      #
      # All three are valid TOML but slip through the line-shape
      # regex. tomllib normalises them into the same flat key dict
      # so the allowlist diff catches every shape regardless of
      # how a contributor writes the key. The runner ships
      # Python 3.12 by default; explicit `python3` invocation so
      # a future runner image change to a different default is
      # caught at lint time.
      - name: Lint .cargo/config.toml [env] keys
        run: |
          set -euo pipefail
          config=src-tauri/.cargo/config.toml

          # Allowlisted env-var names. New entries require an
          # explicit PR that updates both `$config` and this list.
          allowed=$(cat <<'EOF'
          MACOSX_DEPLOYMENT_TARGET
          CMAKE_OSX_DEPLOYMENT_TARGET
          EOF
          )

          # Extract every key under [env] regardless of TOML
          # syntax — quoted, indented, dotted-table all collapse
          # to the same flat dict.
          keys=$(python3 - "$config" <<'PY'
          import sys, tomllib
          with open(sys.argv[1], "rb") as f:
              cfg = tomllib.load(f)
          for k in cfg.get("env", {}):
              print(k)
          PY
          )

          unexpected=$(echo "$keys" | while IFS= read -r key; do
            [ -z "$key" ] && continue
            if ! echo "$allowed" | grep -qFx -- "$key"; then
              echo "$key"
            fi
          done)

          if [ -n "$unexpected" ]; then
            echo "::error::Unallowlisted env-var in $config [env] table:" >&2
            echo "$unexpected" >&2
            echo "::error::These keys override every contributor's build environment." >&2
            echo "::error::To add a key: update $config AND the allowlist in .github/workflows/ci.yml::cargo-env-allowlist in the same PR." >&2
            exit 1
          fi

  mock-completeness:
    name: Playwright mock completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Cross-check that every #[tauri::command] registered in the
      # `tauri::generate_handler!` macro in src-tauri/src/lib.rs has
      # a corresponding default handler in tests/e2e/_mock.ts (#431).
      #
      # The four-place IPC sync rule (CLAUDE.md) requires Rust
      # struct + handler, generate_handler! registration, TS type,
      # and Playwright mock to stay aligned. CI catches Rust-only
      # and TS-only breaks via cargo / svelte-check, but a missing
      # mock is silent: the test specs load without warning, and
      # the unmocked invoke just returns undefined or throws at
      # runtime — a class of e2e flakiness that's painful to
      # diagnose. This step closes that gap.
      #
      # Parser is intentionally minimal: a regex against the
      # generate_handler! block (handler list is whitespace-
      # tolerant but always one path per line in this repo) and a
      # second regex against the `_mock.ts` defaults object
      # matching `^      <key>:\s*(\(|async\b)`. The 6-space indent
      # mirrors the convention of the file; `(\(` or `async`
      # filters out non-handler entries like the meta-key
      # `invoke: wrapped,` at line 355. If the indent ever changes,
      # this step's regex needs to track.
      - name: Diff Tauri commands against Playwright mocks
        run: |
          set -euo pipefail

          # Bare command names from generate_handler!. Strips the
          # `ipc::commands::[..::]<name>` qualifier to the leaf.
          rust_cmds=$(awk '/tauri::generate_handler!\[/,/\]\)/' src-tauri/src/lib.rs \
            | grep -oE 'ipc::commands::[a-z_:]+\b' \
            | awk -F'::' '{print $NF}' \
            | sort -u)

          # Top-level keys in the `defaults` object of `installMocks`.
          # Looks for `<key>: () =>` or `<key>: async` so nested
          # field assignments (e.g. `invoke: wrapped` at line 355)
          # don't get picked up.
          mock_cmds=$(grep -oE '^      [a-z_][a-z_0-9]*:[[:space:]]*(\(|async\b)' tests/e2e/_mock.ts \
            | sed -E 's/^[[:space:]]+//; s/:.*//' \
            | sort -u)

          missing=$(comm -23 <(echo "$rust_cmds") <(echo "$mock_cmds"))
          extra=$(comm -13 <(echo "$rust_cmds") <(echo "$mock_cmds"))

          if [ -n "$missing" ]; then
            echo "::error::Tauri commands without a Playwright default mock:" >&2
            echo "$missing" >&2
            echo "" >&2
            echo "Add a default to tests/e2e/_mock.ts so e2e specs that don't override the command don't get an undefined return / unhandled rejection at runtime." >&2
            exit 1
          fi

          if [ -n "$extra" ]; then
            echo "::warning::Mock entries with no matching Tauri command (likely stale after a command was removed):"
            echo "$extra"
          fi

          echo "OK: $(echo "$rust_cmds" | wc -l) commands, all present in default mock."

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests (vitest)
        run: npm run test:unit

  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Chromium binary across runs — saves ~30s and a few
      # tens of MB of bandwidth per CI invocation. The cache key
      # tracks the @playwright/test version pinned in package-lock so
      # an upgrade invalidates correctly.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

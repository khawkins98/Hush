name: CI

on:
  push:
    branches: [main]
  # Run on every pull request, regardless of base branch. Stacked PRs
  # (e.g. feat/* targeting another feat/*) need CI feedback too — a
  # `branches: [main]` filter would silently skip them.
  pull_request:

# Cancel superseded runs on the same branch to avoid burning CI minutes on
# obsolete commits during a rapid push sequence.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows dropped from the matrix while we focus on the macOS/Linux
        # core. The whisper.cpp build on Windows works but doubles total CI
        # runtime, and we are not yet shipping Windows artefacts. Add
        # `windows-latest` back here when Windows distribution lands (M6 per
        # PRD §11) and we have a real reason to gate on it.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Tauri + whisper-rs need a non-trivial pile of system libraries on
      # Linux. We install them explicitly rather than relying on the runner
      # image to ship every transitive dep. cmake is required by whisper-rs.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev libxi-dev libxtst-dev libx11-dev \
            libasound2-dev \
            cmake pkg-config

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: rustfmt check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      # Clippy on the default feature set first — fast and covers the bulk of
      # the code. The `whisper` feature is exercised separately so a missing
      # cmake on a runner shows up as a clear, scoped failure.
      - name: clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # The `whisper-rs-sys` build calls into whisper.cpp's GGML, which uses
      # `vmmlaq_s32` (an i8mm intrinsic) unconditionally on aarch64. Apple
      # Silicon supports i8mm, but the default macOS clang invocation does
      # not enable that target feature, so the build fails with
      # `always_inline ... requires target feature 'i8mm'`. Telling clang to
      # target armv8.6-a (which includes i8mm in its baseline) on the macOS
      # runner is the smallest fix that keeps the production target intact.
      # Linux/Windows runners are x86_64 and unaffected.
      - name: Set whisper.cpp arch flags (macOS arm64)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-march=armv8.6-a" >> "$GITHUB_ENV"

      - name: clippy (whisper feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features whisper -- -D warnings

      # CI lint: every TODO/FIXME must reference an issue (// TODO(#NNN): ...).
      # Untagged tags rot; tagged ones are findable from the issue tracker.
      - name: Check for untagged TODOs/FIXMEs
        shell: bash
        run: |
          if grep -rn --include="*.rs" -E "//\s*(TODO|FIXME)[[:space:]:][^(]" src-tauri/src/; then
            echo "ERROR: Found TODO/FIXME without an issue reference. Use // TODO(#NNN): or // FIXME(#NNN):"
            exit 1
          fi

      - name: cargo test (default features)
        working-directory: src-tauri
        run: cargo test

      - name: cargo test (whisper feature)
        working-directory: src-tauri
        run: cargo test --features whisper

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

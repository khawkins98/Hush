<?xml version="1.0" encoding="utf-8"?>
<!-- Hush app icon master. Dark warm tile + brand golden-yellow "H"
     mark whose lower-right edge fragments into text "tokens" — the
     speech → transcription motif. Brand colour #ffb81c (allaboutken.com
     hero yellow). Regenerate the full icon set with:
       npx tauri icon src-tauri/icons/icon-source.svg            -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241608"/>
      <stop offset="1" stop-color="#160b05"/>
    </linearGradient>
    <linearGradient id="hgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc94d"/>
      <stop offset="1" stop-color="#ffb81c"/>
    </linearGradient>
  </defs>

  <!-- Rounded tile (macOS-style squircle margin ~7%) -->
  <rect x="72" y="72" width="880" height="880" rx="196" fill="url(#tile)"/>

  <!-- Bold "H": two legs + crossbar, thickness 86 -->
  <g fill="url(#hgrad)">
    <rect x="300" y="300" width="86" height="424" rx="6"/>
    <rect x="560" y="300" width="86" height="424" rx="6"/>
    <rect x="300" y="469" width="346" height="86" rx="6"/>
  </g>

  <!-- Dissolve: the H's lower-right sheds into descending tokens.
       Bright (#ffb81c) near the mark, cooling to orange (#f5a623,
       #c8801e) as they scatter toward the corner. -->
  <g>
    <rect x="664" y="560" width="78" height="26" rx="5" fill="#ffb81c"/>
    <rect x="756" y="560" width="36" height="26" rx="5" fill="#f5a623"/>
    <rect x="664" y="602" width="52" height="26" rx="5" fill="#ffb81c"/>
    <rect x="730" y="602" width="78" height="26" rx="5" fill="#f5a623"/>
    <rect x="664" y="644" width="40" height="26" rx="5" fill="#f5a623"/>
    <rect x="718" y="644" width="52" height="26" rx="5" fill="#c8801e"/>
    <rect x="612" y="726" width="70" height="26" rx="5" fill="#f5a623"/>
    <rect x="696" y="726" width="40" height="26" rx="5" fill="#c8801e"/>
    <rect x="750" y="726" width="28" height="26" rx="5" fill="#c8801e"/>
    <rect x="612" y="768" width="40" height="26" rx="5" fill="#c8801e"/>
  </g>
</svg>

<?xml version="1.0" encoding="utf-8"?>
<!-- Hush menu-bar tray mark. Monochrome silhouette of the brand "H"
     + a few token blocks, sized for the 16/32 px menu bar. Solid
     black on transparent: macOS treats it as a template image
     (icon_as_template(true)) and recolours by menu-bar appearance,
     so only the alpha/shape matters here — no colour, no gradient,
     no fine detail that would mud out at 16 px.
     Regenerate the PNGs with:
       rsvg-convert -w 16 -h 16 tray-icon-source.svg -o tray-icon.png
       rsvg-convert -w 32 -h 32 tray-icon-source.svg -o tray-icon@2x.png -->
<svg width="100" height="100" viewBox="0 0 100 100"
     xmlns="http://www.w3.org/2000/svg">
  <g fill="#000000">
    <!-- Bold H (shifted left to leave room for the token tail) -->
    <rect x="24" y="22" width="15" height="56" rx="2"/>
    <rect x="53" y="22" width="15" height="56" rx="2"/>
    <rect x="24" y="42" width="44" height="15" rx="2"/>
    <!-- Dissolve: chunky blocks that stay legible at 32 px -->
    <rect x="72" y="52" width="11" height="7" rx="1.5"/>
    <rect x="72" y="63" width="7"  height="7" rx="1.5"/>
    <rect x="82" y="63" width="9"  height="7" rx="1.5"/>
    <rect x="64" y="82" width="9"  height="7" rx="1.5"/>
  </g>
</svg>

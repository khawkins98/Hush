# Per-target build flags. Today this exists for one reason:
# `libswift_Concurrency.dylib` is the only Swift runtime dylib the
# `screencapturekit` crate links via `@rpath/...` (everything else
# uses absolute `/usr/lib/swift/...` paths that resolve via the
# dyld shared cache). The screencapturekit crate's build script
# emits `cargo:rustc-link-arg=-Wl,-rpath,/usr/lib/swift` (and a
# couple of CommandLineTools paths) ‚Äî but those directives don't
# propagate from a transitive dep to the final binary's link
# line in stable cargo, so a default `cargo build` of Hush
# produces a binary with **zero** LC_RPATH entries. Ken hit this
# at `npm run tauri dev` time: `dyld[‚Ä¶]: Library not loaded:
# @rpath/libswift_Concurrency.dylib`.
#
# We re-add the rpaths from our own (root) crate where cargo
# does honour `link-arg`. Two paths, in order:
#
# 1. `/usr/lib/swift` ‚Äî resolved via the dyld shared cache on
#    every macOS 12+ system. This is what production app bundles
#    use; matching it here avoids loading two copies of the
#    Concurrency dylib (system + Xcode fallback) which would
#    trigger Apple's `objc[‚Ä¶]: Class _Tt‚Ä¶ is implemented in both`
#    duplicate-class warnings.
# 2. The Xcode toolchain's `swift-5.5/macosx` directory ‚Äî fallback
#    for dev machines where the shared cache lookup somehow
#    misses (rare; the Concurrency dylib's back-compat shim is
#    cached on every modern macOS, but we keep the fallback
#    rather than bet on it).
#
# Hardcoded to Apple's default Xcode location. Contributors with
# Xcode elsewhere can override via `~/.cargo/config.toml` or set
# `DYLD_FALLBACK_LIBRARY_PATH` before invoking cargo. CI's
# `macos-latest` runner has Xcode at this exact path too.

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-arg=-Wl,-rpath,/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
    "-C", "link-arg=-Wl,-rpath,/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.5/macosx",
]

# macOS deployment target (#393).
#
# `whisper-rs-sys`'s vendored `whisper.cpp` uses C++17
# `std::filesystem` symbols (`exists`, `path`,
# `directory_iterator`) that clang marks unavailable below macOS
# 10.15. Without a deployment target set, clang falls back to a
# pre-10.15 baseline and refuses to compile, producing a cascade
# of "introduced in macOS 10.15" errors from `ggml-backend-reg.cpp`
# during the cmake build.
#
# The release workflow + `scripts/tauri-bundle-macos.sh` already
# set this from their own environments; placing it here makes
# `npm run tauri dev`, `cargo tauri dev`, and bare `cargo build`
# inherit the same baseline with zero shell-environment
# dependency. Both vars are needed:
#
#   - `MACOSX_DEPLOYMENT_TARGET` ‚Äî read by rustc / linker / clang
#   - `CMAKE_OSX_DEPLOYMENT_TARGET` ‚Äî read by cmake-rs (the
#     wrapper whisper-rs-sys's build script uses)
#
# `14.0` matches the release workflow's value (the `macos-latest`
# runner's Xcode 16.4 SDK ceiling). Production design target
# stays macOS 26; this is a *minimum* deployment target, not a
# feature gate. Cargo's `[env]` table merges with the inherited
# environment, so a contributor who sets their own value
# upstream (rare; only the release workflow does today) still
# wins ‚Äî `force = false` is the default.
#
# Linux/Windows builds ignore both vars; the gate is macOS-only.
[env]
MACOSX_DEPLOYMENT_TARGET = "14.0"
CMAKE_OSX_DEPLOYMENT_TARGET = "14.0"

<!--
  DMG installer background for Hush.
  Design target: 660×500 pt window — PNG is 1:1 (Finder renders DMG
  backgrounds at 1 px = 1 logical pt, so no 2× Retina scale here).

  The Finder toolbar (~35 pt) overlaps the top of the content area, so
  place footer no lower than (windowSize.height - 40) = ~460.

  Finder icon positions (tauri.conf.json bundle.macOS.dmg):
    Hush.app        → x:165, y:185
    Applications/   → x:495, y:185
    Read Me First.txt (set via osascript in inject-dmg-readme.sh)
                    → x:330, y:340

  To regenerate the PNG:
    bash scripts/generate-dmg-background.sh
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 660 500"
  width="660"
  height="500"
>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="85%">
      <stop offset="0%"   stop-color="#224e8a"/>
      <stop offset="100%" stop-color="#0f2542"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%"  stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.25"/>
    </radialGradient>
  </defs>

  <rect width="660" height="500" fill="url(#bg)"/>

  <!-- Large Hush icon watermark, centred on the window.
       Icon viewBox is 1024×1024; scale(0.22) ≈ 225 px wide. -->
  <g transform="translate(330,238) scale(0.22) translate(-512,-512)"
     fill="none"
     stroke="#3b82f6"
     stroke-linejoin="round"
     opacity="0.14">
    <path stroke-width="64"
          d="M214.4,84.5h595.2c78.2,0,117.2,39.1,117.2,117.2v286.3
             c0,209.7-270.5,437.4-414.8,437.4S97.2,697.8,97.2,488.1
             V201.8C97.2,123.6,136.2,84.5,214.4,84.5z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M577.5,400.3c0,23.2-18.8,42.1-42.1,42.1H384.5
             c-11.2,0-21.9,4.4-29.8,12.3l-46.3,46.3
             c-5.8,5.8-15.3,5.8-21.1,0c-2.8-2.8-4.4-6.6-4.4-10.6
             V274.1c0-23.2,18.8-42.1,42.1-42.1h210.5
             c23.2,0,42.1,18.8,42.1,42.1V400.3z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M661.7,379.3c23.2,0,42.1,18.8,42.1,42.1v216.5
             c0,8.3-6.7,14.9-14.9,14.9c-4,0-7.8-1.6-10.6-4.4
             L632,602.1c-7.9-7.9-18.6-12.3-29.8-12.3H451.3
             c-23.2,0-42.1-18.8-42.1-42.1v-21"/>
  </g>

  <rect width="660" height="500" fill="url(#vignette)"/>

  <!-- Drag hint arrow at y=185 (same as icon centres), from x=245 to x=415 -->
  <g fill="none" stroke="#6b9bd2" stroke-width="2" opacity="0.65">
    <line x1="245" y1="185" x2="415" y2="185" stroke-dasharray="6 4"/>
    <polyline points="406,177 416,185 406,193"/>
  </g>

  <!-- Footer — kept above y=460 so it clears the Finder toolbar -->
  <text
    x="330" y="455"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="13"
    letter-spacing="0.3"
    fill="#aac0d8"
  >Drag Hush to Applications to install</text>
</svg>

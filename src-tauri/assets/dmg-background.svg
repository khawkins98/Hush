<!--
  DMG installer background for Hush.
  Design target: 500×280 pt window (rendered at 2× → 1000×560 px for Retina).

  Finder icon positions (tauri.conf.json bundle.macOS.dmg):
    Hush.app        → x:130, y:120
    Applications/   → x:370, y:120
    Read Me First.txt (set via osascript in inject-dmg-readme.sh)
                    → x:250, y:215

  To regenerate the PNG:
    bash scripts/generate-dmg-background.sh
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 280"
  width="1000"
  height="560"
>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="85%">
      <stop offset="0%"   stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%"  stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <rect width="500" height="280" fill="url(#bg)"/>

  <!-- Large Hush icon watermark, centred on the window.
       Icon viewBox is 1024×1024; scale(0.165) ≈ 169 px wide. -->
  <g transform="translate(250,135) scale(0.165) translate(-512,-512)"
     fill="none"
     stroke="#3b82f6"
     stroke-linejoin="round"
     opacity="0.10">
    <path stroke-width="64"
          d="M214.4,84.5h595.2c78.2,0,117.2,39.1,117.2,117.2v286.3
             c0,209.7-270.5,437.4-414.8,437.4S97.2,697.8,97.2,488.1
             V201.8C97.2,123.6,136.2,84.5,214.4,84.5z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M577.5,400.3c0,23.2-18.8,42.1-42.1,42.1H384.5
             c-11.2,0-21.9,4.4-29.8,12.3l-46.3,46.3
             c-5.8,5.8-15.3,5.8-21.1,0c-2.8-2.8-4.4-6.6-4.4-10.6
             V274.1c0-23.2,18.8-42.1,42.1-42.1h210.5
             c23.2,0,42.1,18.8,42.1,42.1V400.3z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M661.7,379.3c23.2,0,42.1,18.8,42.1,42.1v216.5
             c0,8.3-6.7,14.9-14.9,14.9c-4,0-7.8-1.6-10.6-4.4
             L632,602.1c-7.9-7.9-18.6-12.3-29.8-12.3H451.3
             c-23.2,0-42.1-18.8-42.1-42.1v-21"/>
  </g>

  <rect width="500" height="280" fill="url(#vignette)"/>

  <!-- Drag hint arrow at y=120 (same as icon centres), from x=175 to x=325 -->
  <g fill="none" stroke="#4b6cb7" stroke-width="1.5" opacity="0.45">
    <line x1="175" y1="120" x2="325" y2="120" stroke-dasharray="5 4"/>
    <polyline points="317,113 326,120 317,127"/>
  </g>

  <!-- Footer -->
  <text
    x="250" y="258"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10"
    letter-spacing="0.3"
    fill="#6b7280"
  >Drag Hush to Applications to install</text>
</svg>

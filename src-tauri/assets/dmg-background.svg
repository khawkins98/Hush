<!--
  DMG installer background for Hush.
  Design target: 660×500 pt window — PNG is 1:1 (Finder renders DMG
  backgrounds at 1 px = 1 logical pt, so no 2× Retina scale here).

  Finder icon positions (tauri.conf.json bundle.macOS.dmg):
    Hush.app        → x:165, y:185
    Applications/   → x:495, y:185
    Read Me First.txt (set via osascript in inject-dmg-readme.sh)
                    → x:330, y:305

  To regenerate the PNG:
    bash scripts/generate-dmg-background.sh
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 660 500"
  width="660"
  height="500"
>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="85%">
      <stop offset="0%"   stop-color="#224e8a"/>
      <stop offset="100%" stop-color="#0f2542"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%"  stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.25"/>
    </radialGradient>
    <!-- Amber glow centred on where Read Me First.txt icon sits (330, 305) -->
    <radialGradient id="warn-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="660" height="500" fill="url(#bg)"/>

  <!-- Large Hush icon watermark, centred on the window.
       Icon viewBox is 1024×1024; scale(0.22) ≈ 225 px wide. -->
  <g transform="translate(330,238) scale(0.22) translate(-512,-512)"
     fill="none"
     stroke="#3b82f6"
     stroke-linejoin="round"
     opacity="0.14">
    <path stroke-width="64"
          d="M214.4,84.5h595.2c78.2,0,117.2,39.1,117.2,117.2v286.3
             c0,209.7-270.5,437.4-414.8,437.4S97.2,697.8,97.2,488.1
             V201.8C97.2,123.6,136.2,84.5,214.4,84.5z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M577.5,400.3c0,23.2-18.8,42.1-42.1,42.1H384.5
             c-11.2,0-21.9,4.4-29.8,12.3l-46.3,46.3
             c-5.8,5.8-15.3,5.8-21.1,0c-2.8-2.8-4.4-6.6-4.4-10.6
             V274.1c0-23.2,18.8-42.1,42.1-42.1h210.5
             c23.2,0,42.1,18.8,42.1,42.1V400.3z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M661.7,379.3c23.2,0,42.1,18.8,42.1,42.1v216.5
             c0,8.3-6.7,14.9-14.9,14.9c-4,0-7.8-1.6-10.6-4.4
             L632,602.1c-7.9-7.9-18.6-12.3-29.8-12.3H451.3
             c-23.2,0-42.1-18.8-42.1-42.1v-21"/>
  </g>

  <rect width="660" height="500" fill="url(#vignette)"/>

  <!-- ── Step 2 warning zone (rendered before step badges so badges sit on top) ── -->

  <!-- Amber radial glow centred on the README icon (330, 305) -->
  <ellipse cx="330" cy="305" rx="115" ry="85" fill="url(#warn-glow)"/>
  <!-- Amber dashed ring -->
  <ellipse cx="330" cy="305" rx="82" ry="62"
           fill="none" stroke="#f59e0b" stroke-width="1.5"
           stroke-dasharray="8 5" opacity="0.55"/>

  <!-- Warning triangle — tip at (330, 245), base at y=284; sits above the icon -->
  <path d="M330,245 L308,284 L352,284 Z" fill="#f59e0b" opacity="0.88"/>
  <!-- Exclamation mark inside triangle (dark navy on amber) -->
  <rect x="327.5" y="255" width="5" height="16" rx="2.5" fill="#0c1e38"/>
  <circle cx="330" cy="279" r="3" fill="#0c1e38"/>

  <!-- ── Drag hint arrow at y=185 (same as icon centres), from x=245 to x=415 ── -->
  <g fill="none" stroke="#6b9bd2" stroke-width="2" opacity="0.65">
    <line x1="245" y1="185" x2="415" y2="185" stroke-dasharray="6 4"/>
    <polyline points="406,177 416,185 406,193"/>
  </g>

  <!-- ── Step number badges ── -->

  <!-- Step 1 — upper-left of Hush.app icon (icon centre 165, 185) -->
  <circle cx="112" cy="137" r="13" fill="#3b82f6" opacity="0.85"/>
  <text x="112" y="142"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="bold" fill="white" opacity="0.95">1</text>

  <!-- Step 2 — upper-left of README icon (icon centre 330, 305) -->
  <circle cx="277" cy="256" r="13" fill="#f59e0b" opacity="0.95"/>
  <text x="277" y="261"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="bold" fill="#0c1e38">2</text>

  <!-- ── Footer ── -->
  <text
    x="330" y="395"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="12"
    letter-spacing="0.3"
    fill="#aac0d8"
  >
    <tspan>1  Drag Hush to Applications</tspan>
    <tspan dx="22">2  Open 'Read Me First.txt'</tspan>
  </text>
</svg>

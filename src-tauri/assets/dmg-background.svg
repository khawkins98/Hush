<!--
  DMG installer background for Hush.
  Design target: 660×700 pt window — PNG is 1:1 (Finder renders DMG
  backgrounds at 1 px = 1 logical pt, so no 2× Retina scale here).
  Finder window chrome (title bar + path bar) consumes ~70 pt, so the
  visible content area is roughly y=0..630 within this 700 pt canvas.

  Finder icon positions (tauri.conf.json bundle.macOS.dmg):
    Hush.app        → x:165, y:185
    Applications/   → x:495, y:185
    Read Me First.txt (set via inject-dmg-readme.sh)
                    → x:330, y:390

  To regenerate the PNG:
    bash scripts/generate-dmg-background.sh
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 660 700"
  width="660"
  height="700"
>

  <!-- ── Background: very light blue-grey ── -->
  <rect width="660" height="700" fill="#edf2f7"/>

  <!-- ── Faint Hush watermark, centred on the content area.
       Icon viewBox is 1024×1024; scale(0.22) ≈ 225 px wide. ── -->
  <g transform="translate(330,300) scale(0.22) translate(-512,-512)"
     fill="none"
     stroke="#b0c4d8"
     stroke-linejoin="round"
     opacity="0.065">
    <path stroke-width="64"
          d="M214.4,84.5h595.2c78.2,0,117.2,39.1,117.2,117.2v286.3
             c0,209.7-270.5,437.4-414.8,437.4S97.2,697.8,97.2,488.1
             V201.8C97.2,123.6,136.2,84.5,214.4,84.5z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M577.5,400.3c0,23.2-18.8,42.1-42.1,42.1H384.5
             c-11.2,0-21.9,4.4-29.8,12.3l-46.3,46.3
             c-5.8,5.8-15.3,5.8-21.1,0c-2.8-2.8-4.4-6.6-4.4-10.6
             V274.1c0-23.2,18.8-42.1,42.1-42.1h210.5
             c23.2,0,42.1,18.8,42.1,42.1V400.3z"/>
    <path stroke-width="50" stroke-linecap="round"
          d="M661.7,379.3c23.2,0,42.1,18.8,42.1,42.1v216.5
             c0,8.3-6.7,14.9-14.9,14.9c-4,0-7.8-1.6-10.6-4.4
             L632,602.1c-7.9-7.9-18.6-12.3-29.8-12.3H451.3
             c-23.2,0-42.1-18.8-42.1-42.1v-21"/>
  </g>

  <!-- ── Install arrow: Hush.app (165,185) → Applications (495,185) ── -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7"
            refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#5b8fc4"/>
    </marker>
  </defs>
  <line x1="250" y1="185" x2="414" y2="185"
        stroke="#5b8fc4" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- Subtle drag hint below the arrow -->
  <text x="330" y="222"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="10" fill="#7a9ab5">
    Drag Hush.app to Applications
  </text>

  <!-- ── Section divider ── -->
  <line x1="90" y1="270" x2="570" y2="270"
        stroke="#c8d8e8" stroke-width="0.75"/>

  <!-- ── README attention zone (amber/yellow tinted) ──────────────────────
       Finder will draw the "Read Me First.txt" icon at (330, 390) and its
       filename label below it. Caption text sits well below that label.
       No text above the icon — the ! badge and amber colour communicate
       urgency without cluttering the space Finder uses for the icon/label.
  ── -->
  <rect x="175" y="288" width="310" height="248" rx="14"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1.25" opacity="0.92"/>

  <!-- Attention badge centred on zone top edge, half above / half below -->
  <circle cx="330" cy="288" r="12"
          fill="#f59e0b" stroke="#edf2f7" stroke-width="2.5"/>
  <text x="330" y="293"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="bold" fill="white">!</text>

  <!-- NOTE: Finder renders the README icon at (330, 390) and its label below -->
  <!-- those are injected at build time via inject-dmg-readme.sh              -->

  <!-- Caption — positioned well below where Finder will draw the icon label -->
  <text x="330" y="506"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="11" fill="#78350f">
    After installing, open this file for
  </text>
  <text x="330" y="522"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="11" fill="#78350f">
    security setup and Gatekeeper bypass steps.
  </text>

  <!-- ── Footer ── -->
  <rect x="0" y="553" width="660" height="147" fill="#1b2d3e"/>
  <text x="330" y="576"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="11" fill="#7090a8">
    Hush — open-source privacy tool · github.com/khawkins98/Hush
  </text>
</svg>
